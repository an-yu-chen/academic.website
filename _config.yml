# `_config.yml`

 
# Site Settings

title: "An Yu Chen"
baseurl: ""
url: ""

# Theme (forked from niklasbuschmann/contrast)
theme: contrast

# Author Information
name: "An Yu Chen"
location:  "UK"

# Navigation Menu
navigation:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: Teaching
    url: /teaching/
  - title: Social Responsibility
    url: /social-responsibility/
   

# Homepage style
show_excerpts: true
markdown: kramdown
highlighter: rouge
permalink: pretty

# Bright clean visual style
style:
  background: "#ffffff"
  text: "#1f2937"
  accent: "#2c7be5"
  muted: "#6b7280"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
